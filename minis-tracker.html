// ── CONFIG ───────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwByYnC5Knnt6MTnqsWHkukflOySrS4M3cy2UPo0blAxh4gIEetpzurf0i5IxubMu6tmg/exec";
// ─────────────────────────────────────────────────────────────

const { useState, useEffect, useCallback, useRef } = React;

const STAGES = ["Unbuilt", "Built", "Primed", "Painting", "Painted", "Painted & Based"];
const STAGE_COLORS = {
  "Unbuilt":        { bg: "#1a1a2e", border: "#3a3a5e", text: "#666",    dot: "#2e2e4e" },
  "Built":          { bg: "#1e1e1e", border: "#5a4a2a", text: "#8a7a5a", dot: "#4a3a1e" },
  "Primed":         { bg: "#1e1a1a", border: "#6a3a3a", text: "#9a6a6a", dot: "#4a2020" },
  "Painting":       { bg: "#1e1a1e", border: "#7a4a8a", text: "#ba7aba", dot: "#4a1a5a" },

  "Painted & Based":{ bg: "#1a1e16", border: "#7a9a3a", text: "#aada6a", dot: "#3a5a10" },

const GAME_SYSTEMS = [

      "Chaos Space Marines","Death Guard","Thousand Sons","World Eaters","Chaos Daemons","Chaos Knights",
      "Aeldari","Drukhari","Tyranids","Orks","Necrons","T'au Empire","Genestealer Cults","Leagues of Votann",
  ]},
  { id:"aos", name:"Age of Sigmar", color:"#8a7a2a", icon:"⚡",
    categories:["Characters","Infantry","Cavalry","Monster","Siege Weapon","Spells/Summons"],
    factions:[
      "Stormcast Eternals","Cities of Sigmar","Daughters of Khaine","Fyreslayers","Idoneth Deepkin","Kharadron Overlords","Lumineth Realm-Lords","Seraphon","Sylvaneth",
      "Blades of Khorne","Disciples of Tzeentch","Maggotkin of Nurgle","Hedonites of Slaanesh","Skaven","Slaves to Darkness","Beasts of Chaos",
      "Flesh-Eater Courts","Nighthaunt","Ossiarch Bonereapers","Soulblight Gravelords",

    factions:["Terran","Zerg","Protoss"] },
  { id:"whf", name:"Warhammer Fantasy", color:"#4a7a3a", icon:"🐉",
    categories:["Characters","Infantry","Cavalry","Monster","Siege Weapon"],
    factions:[
      "The Empire","Bretonnia","Kislev","Dwarfs","High Elves","Wood Elves","Dark Elves","Lizardmen","Skaven",

  "#3a8a8a","#2a7a8a","#4a8a9a",

const emptyStages = () => Object.fromEntries(STAGES.map(s => [s, 0]));
const totalModels      = p => STAGES.reduce((a, s) => a + (p.stageCounts[s] || 0), 0);
const totalTokens      = p => p.hasTokens ? STAGES.reduce((a, s) => a + ((p.tokenStageCounts||{})[s] || 0), 0) : 0;
const totalWithTokens  = p => totalModels(p) + totalTokens(p);
const doneModels       = p => p.stageCounts["Painted & Based"] || 0;
const stageCountWithTokens = (p, s) => (p.stageCounts[s]||0) + (p.hasTokens ? ((p.tokenStageCounts||{})[s]||0) : 0);

// ── Google Sheets API ─────────────────────────────────────────
// Sheet layout: two tabs — "armies" and "units"
// armies: id | gameSystemId | faction | customName | name | color
// units:  id | armyId | name | notes | Unbuilt | Built | Primed | Painted | Done
// settings: stored in a "settings" tab as key|value rows

// ── Sheet helpers ─
async function getWithRetry(url, retries=3, delayMs=1500) {
  for (let i = 0; i < retries; i++) {
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (data.error) throw new Error(data.error);
      return data;
    } catch(e) {
      if (i < retries - 1) {
        await new Promise(res => setTimeout(res, delayMs * (i + 1)));
      } else {
        throw e;
      }
    }
  }
}

async function readAll() {
  return getWithRetry(SCRIPT_URL + "?action=read");
}

async function saveAll(armies, units, settings) {
  const payload = JSON.stringify({ action:"save", armies, units, settings });
  // Use no-cors POST — Apps Script receives the body, we just can't read the response
  // We verify by doing a read shortly after and checking data matches
  const r = await fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: payload,
  });
  // no-cors returns opaque response — we assume success if no network error thrown
  return { ok: true };
}

function parseArmies(data) {
  const rows = (data.values || []).slice(1); // skip header
  return rows.filter(r => r[0]).map(r => ({
    id: parseInt(r[0]),
    gameSystemId: r[1] || "40k",
    faction: r[2] || "",
    customName: r[3] || "",
    name: r[4] || r[2] || "",
    color: r[5] || ARMY_PALETTE[0],
  }));
}

function parseUnits(data) {
  const rows = (data.values || []).slice(1);
  return rows.filter(r => r[0]).map(r => ({
    id: parseInt(r[0]),
    armyId: parseInt(r[1]),
    name: r[2] || "",
    notes: r[3] || "",
    stageCounts: {
      Unbuilt:          parseInt(r[4]) || 0,
      Built:            parseInt(r[5]) || 0,
      Primed:           parseInt(r[6]) || 0,
      Painting:         parseInt(r[7]) || 0,
      Painted:          parseInt(r[8]) || 0,
      "Painted & Based":parseInt(r[9]) || 0,
    },
    hasTokens:  r[10] === "true",
    tokenName:  r[11] || "Token",
    tokenStageCounts: {
      Unbuilt:          parseInt(r[12]) || 0,
      Built:            parseInt(r[13]) || 0,
      Primed:           parseInt(r[14]) || 0,
      Painting:         parseInt(r[15]) || 0,
      Painted:          parseInt(r[16]) || 0,
      "Painted & Based":parseInt(r[17]) || 0,
    },
    squadSize: parseInt(r[18]) || 1,
    category:  r[19] || "Other",
  }));
}

function parseSettings(data) {
  const rows = (data.values || []).slice(1);
  const out = {};
  rows.filter(r => r[0]).forEach(r => { out[r[0]] = r[1]; });
  return out;
}

function armyToRow(a) { return [String(a.id), a.gameSystemId, a.faction, a.customName||"", a.name, a.color]; }
function unitToRow(p) { const tsc = p.tokenStageCounts || {}; return [String(p.id), String(p.armyId), p.name, p.notes||"", ...STAGES.map(s => String(p.stageCounts[s]||0)), String(!!p.hasTokens), p.tokenName||"Token", ...STAGES.map(s => String(tsc[s]||0)), String(p.squadSize||1), p.category||"Other"]; }

// ── Components ────────────────────────────────────────────────

function ProjectCard({ project, onEdit, onDelete, onUpdateCounts, onDragStart, onDragOver, onDrop, isDragOver }) {
  const total = totalModels(project), done = doneModels(project);

  const setStageValue = (stage, val) => {
    const n = Math.max(0, parseInt(val) || 0);
    onUpdateCounts(project.id, { ...project.stageCounts, [stage]: n });
  };

  return (
    <div
      draggable
      onDragStart={onDragStart}
      onDragOver={e=>{e.preventDefault();onDragOver();}}
      onDrop={onDrop}
      style={{ background:"#121212", border:`1px solid ${isDragOver?"#5a5a9a":"#2a2a2a"}`, borderRadius:"6px", overflow:"hidden", transition:"border-color 0.15s" }}
    >
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px 8px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <span style={{ color:"#333", fontSize:"14px", cursor:"grab", userSelect:"none", flexShrink:0 }} title="Drag to reorder">⠿</span>
          <div>
            <div style={{ color:"#e8e0d0", fontFamily:"'Cinzel',serif", fontSize:"14px", fontWeight:"600", letterSpacing:"0.02em" }}>{project.name}</div>
            <div style={{ color:"#555", fontSize:"11px", marginTop:"2px", fontFamily:"monospace" }}>
              {total} {total===1?"model":"models"}{project.squadSize>1?` · squads of ${project.squadSize}`:""}
              {done>0 && <span style={{ color:"#5a7a2a", marginLeft:"6px" }}>· {done} done</span>}
              {project.notes && <span style={{ color:"#444", marginLeft:"6px", fontStyle:"italic" }}>· {project.notes}</span>}
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:"5px" }}>
          <button onClick={()=>onEdit(project)} style={{ background:"none", border:"1px solid #2a2a2a", color:"#666", borderRadius:"4px", padding:"3px 8px", cursor:"pointer", fontSize:"11px" }}>Edit</button>
          <button onClick={()=>onDelete(project.id)} style={{ background:"none", border:"1px solid #3a2020", color:"#5a3a3a", borderRadius:"4px", padding:"3px 8px", cursor:"pointer", fontSize:"11px" }}>✕</button>
        </div>
      </div>
      {total>0 && (
        <div style={{ display:"flex", gap:"2px", padding:"0 14px", marginBottom:"10px" }}>
          {STAGES.map(s => { const cnt=project.stageCounts[s]; if(!cnt)return null;
            return <div key={s} title={`${s}: ${cnt}`} style={{ flex:(cnt/total)*100, height:"5px", background:STAGE_COLORS[s].border, borderRadius:"2px", minWidth:"4px", transition:"flex 0.25s" }}/>;
          })}
        </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:"2px", padding:"0 10px 8px" }}>
        {STAGES.map(s => {
          const cnt=project.stageCounts[s]||0, sc=STAGE_COLORS[s], active=cnt>0;
          const btnStyle = (enabled) => ({ background:"none", border:`1px solid ${enabled?"#3a3a3a":"#1e1e1e"}`, color:enabled?"#888":"#2a2a2a", borderRadius:"3px", width:"18px", height:"18px", cursor:enabled?"pointer":"default", fontSize:"13px", padding:0, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 });
          return (
            <div key={s} style={{ background:active?sc.dot:"#0e0e0e", border:`1px solid ${active?sc.border:"#1e1e1e"}`, borderRadius:"4px", padding:"5px 4px", display:"flex", flexDirection:"column", alignItems:"center", gap:"3px", transition:"background 0.2s, border-color 0.2s" }}>
              <div style={{ color:active?sc.text:"#333", fontSize:"9px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.03em", lineHeight:1, textAlign:"center" }}>{STAGE_SHORT[s]}</div>
              <input
                type="number" min="0" value={cnt}
                onChange={e => setStageValue(s, e.target.value)}
                onFocus={e => e.target.select()}
                style={{ width:"100%", background:"none", border:"none", color:active?"#e8e0d0":"#444", fontFamily:"'Cinzel',serif", fontSize:"15px", fontWeight:"700", textAlign:"center", padding:"0", cursor:"text", WebkitAppearance:"none", MozAppearance:"textfield" }}
              />
              <div style={{ display:"flex", gap:"2px" }}>
                <button onClick={()=>setStageValue(s, cnt-1)} disabled={cnt===0} style={btnStyle(cnt>0)}>−</button>
                <button onClick={()=>setStageValue(s, cnt+1)} style={btnStyle(true)}>+</button>
              </div>
            </div>
          );
        })}
      </div>
      {project.hasTokens && (() => {
        const tsc = project.tokenStageCounts || Object.fromEntries(STAGES.map(s=>[s,0]));
        const tTotal = STAGES.reduce((a,s)=>a+(tsc[s]||0),0);
        const setTokenStage = (stage, val) => {
          const n = Math.max(0, parseInt(val)||0);
          onUpdateCounts(project.id, project.stageCounts, {...tsc, [stage]: n});
        };
        return (
          <div style={{ borderTop:"1px solid #1e1e1e", padding:"5px 10px 8px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"5px" }}>
              <span style={{ color:"#7a6a3a", fontSize:"9px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.06em" }}>🪙 {project.tokenName||"Token"}</span>
              <span style={{ color:"#3a3a2a", fontSize:"9px", fontFamily:"monospace" }}>{tTotal} total</span>
              {tTotal > 0 && (
                <div style={{ display:"flex", gap:"1px", flex:1 }}>
                  {STAGES.map(s=>{ const cnt=tsc[s]||0; if(!cnt)return null;
                    return <div key={s} title={`${s}: ${cnt}`} style={{ flex:(cnt/tTotal)*100, height:"3px", background:STAGE_COLORS[s].border, borderRadius:"1px", minWidth:"3px" }}/>;
                  })}
                </div>
              )}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:"2px" }}>
              {STAGES.map(s => {
                const cnt = tsc[s]||0, sc = STAGE_COLORS[s], active = cnt>0;
                return (
                  <div key={s} style={{ background:active?sc.dot+"bb":"#0a0a0a", border:`1px solid ${active?sc.border+"88":"#181818"}`, borderRadius:"3px", padding:"3px 2px", display:"flex", flexDirection:"column", alignItems:"center", gap:"2px" }}>
                    <div style={{ color:active?sc.text:"#2a2a2a", fontSize:"8px", fontFamily:"monospace", textTransform:"uppercase", lineHeight:1, textAlign:"center" }}>{STAGE_SHORT[s]}</div>
                    <input type="number" min="0" value={cnt}
                      onChange={e=>setTokenStage(s,e.target.value)}
                      onFocus={e=>e.target.select()}
                      style={{ width:"100%", background:"none", border:"none", color:active?"#c8b060":"#2a2a2a", fontFamily:"'Cinzel',serif", fontSize:"12px", fontWeight:"700", textAlign:"center", padding:0, WebkitAppearance:"none", MozAppearance:"textfield" }}
                    />
                    <div style={{ display:"flex", gap:"1px" }}>
                      <button onClick={()=>setTokenStage(s,cnt-1)} disabled={cnt===0} style={{ background:"none", border:`1px solid ${cnt>0?"#2a2a2a":"#141414"}`, color:cnt>0?"#666":"#1e1e1e", borderRadius:"2px", width:"14px", height:"14px", cursor:cnt>0?"pointer":"default", fontSize:"11px", padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                      <button onClick={()=>setTokenStage(s,cnt+1)} style={{ background:"none", border:"1px solid #2a2a2a", color:"#666", borderRadius:"2px", width:"14px", height:"14px", cursor:"pointer", fontSize:"11px", padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}


// ── Tooltip ───────────────────────────────────────────────────
function Tooltip({ lines, color, children }) {
  const [show, setShow] = React.useState(false);
  const [pos,  setPos]  = React.useState({ x:0, y:0 });
  const ref = React.useRef(null);

  return (
    <div ref={ref} style={{ position:"relative", display:"inline-flex" }}
      onMouseEnter={e=>{ setShow(true); const r=ref.current.getBoundingClientRect(); setPos({x:r.left, y:r.bottom+6}); }}
      onMouseLeave={()=>setShow(false)}
    >
      {children}
      {show && lines && lines.length>0 && (
        <div style={{
          position:"fixed", left:pos.x, top:pos.y, zIndex:999,
          background:"#161616", border:`1px solid ${color||"#333"}44`,
          borderRadius:"6px", padding:"8px 12px", minWidth:"160px", maxWidth:"280px",
          boxShadow:"0 4px 20px rgba(0,0,0,0.7)", pointerEvents:"none",
        }}>
          {lines.map((line,i)=>(
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:"16px", padding:"2px 0", borderTop: i>0?"1px solid #1e1e1e":"none" }}>
              <span style={{ color:"#666", fontSize:"11px", fontFamily:"monospace" }}>{line.label}</span>
              <span style={{ color:"#e8e0d0", fontSize:"12px", fontFamily:"'Cinzel',serif", fontWeight:"600" }}>{line.value}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ArmyModal({ army, gameSystemId, factions, onSave, onClose }) {
  const [faction,    setFaction]    = useState(army?.faction || factions[0] || "");
  const [customName, setCustomName] = useState(army?.customName || "");

  const lStyle = { color:"#888", fontSize:"11px", marginBottom:"4px", textTransform:"uppercase", letterSpacing:"0.08em", fontFamily:"monospace" };
  const displayName = customName.trim() || faction;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:"20px" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:"#161616", border:"1px solid #3a3a5e", borderRadius:"8px", padding:"24px", width:"100%", maxWidth:"380px", boxShadow:"0 0 40px rgba(60,60,120,0.3)" }}>
        <div style={{ color:"#e8e0d0", fontFamily:"'Cinzel',serif", fontSize:"17px", fontWeight:"700", marginBottom:"20px" }}>{army?.id?"Edit Army":"New Army"}</div>
        <div style={{ display:"flex", flexDirection:"column", gap:"14px" }}>
          <div><div style={lStyle}>Faction</div>
            <select style={{ ...iStyle, appearance:"none", cursor:"pointer" }} value={faction} onChange={e=>setFaction(e.target.value)}>
              {[...factions].sort((a,b)=>a.localeCompare(b)).map(f=><option key={f} value={f}>{f}</option>)}
            </select>
          </div>
          <div><div style={lStyle}>Custom Name <span style={{ color:"#555", textTransform:"none", letterSpacing:0 }}>(optional)</span></div>
            <input style={iStyle} value={customName} onChange={e=>setCustomName(e.target.value)} placeholder={`e.g. "My ${faction}" or leave blank`}/>
            {customName.trim()&&<div style={{ color:"#555", fontSize:"11px", marginTop:"4px", fontFamily:"monospace" }}>Will appear as: <span style={{ color:"#888" }}>{customName.trim()}</span></div>}
          </div>
          <div><div style={lStyle}>Colour</div>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
              {ARMY_PALETTE.map(c=><div key={c} onClick={()=>setColor(c)} style={{ width:"28px", height:"28px", borderRadius:"50%", background:c, cursor:"pointer", border:color===c?"2px solid #e8e0d0":"2px solid transparent" }}/>)}
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:"8px", marginTop:"20px", justifyContent:"flex-end" }}>
          <button onClick={onClose} style={{ background:"none", border:"1px solid #333", color:"#666", borderRadius:"4px", padding:"8px 16px", cursor:"pointer", fontFamily:"monospace", fontSize:"12px" }}>Cancel</button>
          <button onClick={()=>onSave({...army, faction, customName:customName.trim(), name:displayName, color, gameSystemId})} style={{ background:"#2a2a4a", border:"1px solid #5a5a9a", color:"#aaaadd", borderRadius:"4px", padding:"8px 20px", cursor:"pointer", fontFamily:"'Cinzel',serif", fontSize:"12px", fontWeight:"600" }}>Save</button>
        </div>
      </div>
    </div>
  );
}

function ProjectModal({ project, armies, defaultArmyId, onSave, onClose }) {
  const init = project?.stageCounts || emptyStages();
  const [name,        setName]        = useState(project?.name || "");
  const [armyId,      setArmyId]      = useState(project?.armyId ?? (defaultArmyId || armies[0]?.id));
  const [notes,       setNotes]       = useState(project?.notes || "");
  const [stageCounts, setStageCounts] = useState(init);
  const [totalInput,  setTotalInput]  = useState(String(STAGES.reduce((a,s)=>a+(init[s]||0),0)||""));
  const currentTotal = STAGES.reduce((a,s)=>a+(stageCounts[s]||0),0);
  const applyTotal = () => {
    const n = parseInt(totalInput)||0; if(n<1)return;
    if(currentTotal===0) setStageCounts({...emptyStages(), Unbuilt:n});

// ── Quest Engine ──────────────────────────────────────────────

const QUEST_TRANSITIONS = [
  { from:"Unbuilt",  to:"Built",           verb:"Build",  color:"#5a4a2a" },
  { from:"Built",    to:"Primed",          verb:"Prime",  color:"#6a3a3a" },
  { from:"Primed",   to:"Painting",        verb:"Start painting", color:"#7a4a8a" },
  { from:"Painting", to:"Painted",         verb:"Finish painting", color:"#3a4a8a" },
  { from:"Painted",  to:"Painted & Based", verb:"Base",   color:"#5a7a2a" },
];

function pickQuest(projects, armies, transition, excludeUnitId=null) {
  const { from, to, verb, color } = transition;
  const candidates = projects.filter(p => (p.stageCounts[from]||0) > 0);
  if (candidates.length === 0) return null;
  const pool = excludeUnitId ? (candidates.filter(p=>p.id!==excludeUnitId).length > 0 ? candidates.filter(p=>p.id!==excludeUnitId) : candidates) : candidates;
  const unit = pool[Math.floor(Math.random() * pool.length)];
  const army = armies.find(a=>a.id===unit.armyId);
  const gs = army ? GAME_SYSTEMS.find(g=>g.id===army.gameSystemId) : null;
  const squadSize = unit.squadSize || 1;
  const available = unit.stageCounts[from] || 0;
  const alreadyInTo = unit.stageCounts[to] || 0;
  const remainder = squadSize - (alreadyInTo % squadSize);
  const needed = remainder === squadSize ? squadSize : remainder;
  const count = Math.min(needed, available);
  const isTopUp = remainder !== squadSize;
  return { unitId:unit.id, unitName:unit.name, armyName:army?.name||"", systemName:gs?.name||"", systemColor:gs?.color||"#888", from, to, verb, color, count, squadSize, isTopUp };
}

function generateQuests(projects, armies) {
  return QUEST_TRANSITIONS.map(t => pickQuest(projects, armies, t));
}

function QuestsPanel({ projects, armies }) {
  const [quests, setQuests] = React.useState(() => generateQuests(projects, armies));

  const refreshQuest = (idx) => {
    setQuests(prev => {
      const next = [...prev];
      next[idx] = pickQuest(projects, armies, QUEST_TRANSITIONS[idx], prev[idx]?.unitId);
      return next;
    });
  };

  const rerollAll = () => setQuests(generateQuests(projects, armies));

  const hasAny = quests.some(q=>q!==null);

  return (
    <div style={{ maxWidth:"820px", margin:"0 auto", padding:"16px 20px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"18px" }}>
        <span style={{ fontFamily:"'Cinzel',serif", fontSize:"16px", fontWeight:"700", color:"#c8b870" }}>⚔ Daily Quests</span>
        <button onClick={rerollAll} style={{ background:"none", border:"1px solid #3a3a2a", color:"#7a6a3a", borderRadius:"4px", padding:"5px 12px", cursor:"pointer", fontFamily:"monospace", fontSize:"11px" }}>↻ Reroll All</button>
      </div>
      {!hasAny ? (
        <div style={{ color:"#333", textAlign:"center", padding:"60px 0", fontFamily:"monospace", fontSize:"13px" }}>
          No quests available — add some units with models to get started.
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
          {QUEST_TRANSITIONS.map((t, idx) => {
            const q = quests[idx];
            if (!q) return (
              <div key={idx} style={{ background:"#0e0e0e", border:"1px solid #1a1a1a", borderRadius:"6px", padding:"14px 16px", display:"flex", alignItems:"center", gap:"12px", opacity:0.4 }}>
                <div style={{ width:"8px", height:"8px", borderRadius:"50%", background:"#2a2a2a", flexShrink:0 }}/>
                <span style={{ color:"#333", fontFamily:"monospace", fontSize:"12px", flex:1 }}>No {t.from.toLowerCase()} models available</span>
              </div>
            );
            return (
              <div key={idx} style={{ background:"#121212", border:`1px solid ${q.color}44`, borderRadius:"6px", padding:"14px 16px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"8px" }}>
                  <div style={{ width:"8px", height:"8px", borderRadius:"50%", background:q.color, flexShrink:0 }}/>
                  <div style={{ flex:1 }}>
                    <div style={{ color:"#e8e0d0", fontFamily:"'Cinzel',serif", fontSize:"14px", fontWeight:"600", marginBottom:"3px" }}>
                      {q.verb} <span style={{ color:q.color }}>{q.count} {q.unitName}</span>
                    </div>
                    <div style={{ color:"#555", fontSize:"11px", fontFamily:"monospace" }}>
                      {q.isTopUp ? `Top up to next squad of ${q.squadSize}` : `1 full squad of ${q.squadSize}`}
                      <span style={{ color:"#3a3a3a", marginLeft:"6px" }}>{q.from} → {q.to}</span>
                    </div>
                  </div>
                  <button onClick={()=>refreshQuest(idx)} title="Reroll this quest" style={{ background:"none", border:"1px solid #2a2a2a", color:"#555", borderRadius:"4px", padding:"5px 9px", cursor:"pointer", fontSize:"13px", flexShrink:0 }}>↻</button>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:"6px", borderTop:"1px solid #1e1e1e", paddingTop:"7px" }}>
                  <span style={{ width:"5px", height:"5px", borderRadius:"50%", background:q.systemColor, flexShrink:0 }}/>
                  <span style={{ color:q.systemColor, fontSize:"10px", fontFamily:"'Cinzel',serif", fontWeight:"600" }}>{q.systemName}</span>
                  <span style={{ color:"#3a3a3a", fontSize:"10px", fontFamily:"monospace" }}>· {q.armyName}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [armies,          setArmies]          = useState([]);
  const [projects,        setProjects]        = useState([]);
  const [activeSystemId,  setActiveSystemId]  = useState(null);
  const [activeArmyId,    setActiveArmyId]    = useState("all");
  const [stageFilter,     setStageFilter]     = useState("All");
  const [enabledSystems,  setEnabledSystems]  = useState([]);
  const [projectModal,    setProjectModal]    = useState(null);
  const [armyModal,       setArmyModal]       = useState(null);
  const [systemPickerOpen,setSystemPickerOpen]= useState(false);
  const [activeView,      setActiveView]      = useState("units"); // "units" | "quests"
  const [nextArmyId,      setNextArmyId]      = useState(1);
  const [nextProjectId,   setNextProjectId]   = useState(1);
  const [status,          setStatus]          = useState("loading"); // loading | ready | error | saving
  const [dragId,          setDragId]          = useState(null);
  const [dragOverId,      setDragOverId]      = useState(null);
  const [dragOverCategory,setDragOverCategory] = useState(null);
  const [armyDragId,      setArmyDragId]      = useState(null);
  const [armyDragOverId,  setArmyDragOverId]  = useState(null);
  const [errorMsg,        setErrorMsg]        = useState("");
  const [saveError,       setSaveError]       = useState(false);
  const saveTimer = useRef(null);

  const isConfigured = SCRIPT_URL !== "YOUR_SCRIPT_URL_HERE";

  // ── Load from Sheets ──
  const loadData = useCallback(async () => {
    setStatus("loading");
    setErrorMsg("");
    try {
      const { armies: armyRows, units: unitRows, settings: settingRows } = await readAll();
      const loadedArmies   = parseArmies({ values: armyRows });
      const loadedProjects = parseUnits({ values: unitRows });
      const settings       = parseSettings({ values: settingRows });
      setArmies(loadedArmies);
      setProjects(loadedProjects);
      const maxAid = loadedArmies.reduce((m,a)=>Math.max(m,a.id),0);
      const maxPid = loadedProjects.reduce((m,p)=>Math.max(m,p.id),0);
      setNextArmyId(maxAid+1);
      setNextProjectId(maxPid+1);
      const es = settings.enabledSystems ? JSON.parse(settings.enabledSystems) : GAME_SYSTEMS.map(g=>g.id);
      setEnabledSystems(es);
      setActiveSystemId(settings.activeSystemId || es[0] || "40k");
      setStatus("ready");
    } catch(e) {
      setErrorMsg(e.message);
      setStatus("error");
    }
  }, []);

  useEffect(() => { if (isConfigured) loadData(); }, []);

  // ── Debounced save ──
  const scheduleSave = useCallback((newArmies, newProjects, newSettings) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setStatus("saving");
    setSaveError(false);
    saveTimer.current = setTimeout(async () => {
      try {
        const armyRows     = [["id","gameSystemId","faction","customName","name","color"], ...newArmies.map(armyToRow)];
        const unitRows     = [["id","armyId","name","notes","Unbuilt","Built","Primed","Painting","Painted","Painted & Based","hasTokens","tokenName","t_Unbuilt","t_Built","t_Primed","t_Painting","t_Painted","t_PaintedBased","squadSize","category"], ...newProjects.map(unitToRow)];
        const settingsRows = [["key","value"], ...Object.entries(newSettings).map(([k,v])=>[k,typeof v==="object"?JSON.stringify(v):String(v)])];
        await saveAll(armyRows, unitRows, settingsRows);
        setStatus("ready");
        setSaveError(false);
      } catch(e) {
        setStatus("ready"); // don't kill the whole app for a save failure
        setSaveError(true);
        setErrorMsg(e.message);
      }
    }, 1200);
  }, []);

  const getSettings = (overrides={}) => ({
    enabledSystems: overrides.enabledSystems ?? enabledSystems,
    activeSystemId: overrides.activeSystemId ?? activeSystemId,
    nextArmyId:     String(overrides.nextArmyId ?? nextArmyId),
    nextProjectId:  String(overrides.nextProjectId ?? nextProjectId),
  });

  // ── Derived state ──
  const activeEnabled = enabledSystems.length>0 ? enabledSystems : GAME_SYSTEMS.map(g=>g.id);
  const resolvedSid   = activeSystemId && activeEnabled.includes(activeSystemId) ? activeSystemId : activeEnabled[0];
  const activeSystem  = GAME_SYSTEMS.find(g=>g.id===resolvedSid) || GAME_SYSTEMS[0];
  const systemArmies  = armies.filter(a=>a.gameSystemId===resolvedSid);
  const activeArmy    = systemArmies.find(a=>a.id===activeArmyId);
  const scopeProjects = activeArmyId==="all" ? projects.filter(p=>systemArmies.some(a=>a.id===p.armyId)) : projects.filter(p=>p.armyId===activeArmyId);
  const visibleProjects = scopeProjects.filter(p=>stageFilter==="All"||(p.stageCounts[stageFilter]||0)>0);
  const grandTotal    = projects.reduce((s,p)=>s+totalWithTokens(p),0);
  const grandDone     = projects.reduce((s,p)=>s+doneModels(p),0);
  const scopeModels   = scopeProjects.reduce((s,p)=>s+totalWithTokens(p),0);
  const scopeDone     = scopeProjects.reduce((s,p)=>s+doneModels(p),0);

  // ── Handlers ──
  const saveArmy = (form) => {
    let newArmies, newNaid = nextArmyId;
    if (form.id) { newArmies = armies.map(a=>a.id===form.id?form:a); }
    else { form = {...form, id:nextArmyId}; newArmies=[...armies,form]; newNaid=nextArmyId+1; setNextArmyId(newNaid); setActiveArmyId(form.id); }
    setArmies(newArmies);
    scheduleSave(newArmies, projects, getSettings({nextArmyId:newNaid}));
    setArmyModal(null);
  };

  const deleteArmy = (id) => {
    if (!confirm("Delete this army and all its units?")) return;
    const newArmies   = armies.filter(a=>a.id!==id);
    const newProjects = projects.filter(p=>p.armyId!==id);
    setArmies(newArmies); setProjects(newProjects); setActiveArmyId("all");
    scheduleSave(newArmies, newProjects, getSettings());
  };

  const saveProject = (form) => {
    let newProjects, newNpid = nextProjectId;
    if (form.id) { newProjects = projects.map(p=>p.id===form.id?form:p); }
    else { form={...form,id:nextProjectId}; newProjects=[...projects,form]; newNpid=nextProjectId+1; setNextProjectId(newNpid); }
    setProjects(newProjects);
    scheduleSave(armies, newProjects, getSettings({nextProjectId:newNpid}));
    setProjectModal(null);
  };

  const deleteProject = (id) => {
    if (!confirm("Remove this unit?")) return;
    const newProjects = projects.filter(p=>p.id!==id);
    setProjects(newProjects);
    scheduleSave(armies, newProjects, getSettings());
  };

  const updateCounts = (id, stageCounts, tokenStageCounts) => {
    const newProjects = projects.map(p=>p.id===id?{...p,stageCounts,...(tokenStageCounts!==undefined?{tokenStageCounts}:{})}:p);
    setProjects(newProjects);
    scheduleSave(armies, newProjects, getSettings());
  };

  const reorderProjects = (fromId, toId) => {
    if (fromId === toId) return;
    const arr = [...projects];
    const fromIdx = arr.findIndex(p => p.id === fromId);
    const toIdx   = arr.findIndex(p => p.id === toId);
    // When reordering within a category, also snap to the target's category
    const targetCategory = arr[toIdx]?.category;
    const [moved] = arr.splice(fromIdx, 1);
    if (targetCategory) moved.category = targetCategory;
    arr.splice(toIdx, 0, moved);
    setProjects(arr);
    scheduleSave(armies, arr, getSettings());
    setDragId(null); setDragOverId(null); setDragOverCategory(null);
  };

  const assignCategory = (unitId, category) => {
    const newProjects = projects.map(p => p.id===unitId ? {...p, category} : p);
    setProjects(newProjects);
    scheduleSave(armies, newProjects, getSettings());
    setDragId(null); setDragOverId(null); setDragOverCategory(null);
  };

  const reorderArmies = (fromId, toId) => {
    if (fromId === toId) return;
    const arr = [...armies];
    const fromIdx = arr.findIndex(a => a.id === fromId);
    const toIdx   = arr.findIndex(a => a.id === toId);
    const [moved] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, moved);
    setArmies(arr);
    setArmyDragId(null); setArmyDragOverId(null);
  };

  const toggleSystem = (id) => {
    const on = enabledSystems.includes(id);
    if (on && enabledSystems.length===1) return;
    const next = on ? enabledSystems.filter(s=>s!==id) : [...enabledSystems,id];
    const ordered = GAME_SYSTEMS.map(g=>g.id).filter(gid=>next.includes(gid));
    const newSid = ordered.includes(resolvedSid) ? resolvedSid : ordered[0];
    setEnabledSystems(ordered); setActiveSystemId(newSid); setSystemPickerOpen(false);
    scheduleSave(armies, projects, getSettings({enabledSystems:ordered, activeSystemId:newSid}));
  };

  const switchSystem = (id) => {
    setActiveSystemId(id); setActiveArmyId("all"); setStageFilter("All");
    scheduleSave(armies, projects, getSettings({activeSystemId:id}));
  };

  if (!isConfigured) return <SetupScreen/>;

  if (status==="loading") return (
    <div style={{ minHeight:"100vh", background:"#0e0e0e", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"12px", color:"#444", fontFamily:"monospace", fontSize:"13px" }}>
      <div style={{ fontFamily:"'Cinzel',serif", color:"#c8b870", fontSize:"18px" }}>⚔ Minis Tracker</div>
      <div>Loading from Google Sheets…</div>
    </div>
  );

  if (status==="error") return (
    <div style={{ minHeight:"100vh", background:"#0e0e0e", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"12px", color:"#9a4a4a", fontFamily:"monospace", fontSize:"12px", padding:"20px", textAlign:"center" }}>
      <div style={{ fontSize:"18px" }}>⚠</div>
      <div style={{ color:"#e8e0d0", fontFamily:"'Cinzel',serif" }}>Couldn't connect to Google Sheets</div>
      <div style={{ color:"#666", maxWidth:"400px" }}>{errorMsg}</div>
      <button onClick={loadData} style={{ marginTop:"12px", background:"#1a1a2e", border:"1px solid #4a4a7a", color:"#aaaadd", borderRadius:"4px", padding:"8px 20px", cursor:"pointer", fontFamily:"monospace", fontSize:"12px" }}>Retry</button>
    </div>
  );

  return (
    <div onClick={()=>systemPickerOpen&&setSystemPickerOpen(false)} style={{ minHeight:"100vh", background:"#0e0e0e", color:"#e8e0d0", fontFamily:"'Segoe UI',sans-serif" }}>

      {/* ── Top bar ── */}
      <div style={{ background:"#080808", borderBottom:"1px solid #1a1a1a" }}>
        <div style={{ maxWidth:"820px", margin:"0 auto", padding:"14px 20px 0" }}>
          <div style={{ marginBottom:"14px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"10px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                <span style={{ fontSize:"20px", fontFamily:"'Cinzel',serif", fontWeight:"700", letterSpacing:"0.08em", color:"#c8b870" }}>⚔ MINIS</span>
                {status==="saving" && <span style={{ color:"#3a5a3a", fontSize:"11px", fontFamily:"monospace" }}>saving…</span>}
                {saveError && (
                  <span style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                    <span style={{ color:"#8a3a3a", fontSize:"11px", fontFamily:"monospace" }}>⚠ save failed</span>
                    <button onClick={()=>loadData()} style={{ background:"none", border:"1px solid #5a3a3a", color:"#9a5a5a", borderRadius:"3px", padding:"2px 7px", cursor:"pointer", fontFamily:"monospace", fontSize:"10px" }}>reconnect</button>
                  </span>
                )}
              </div>
              <button onClick={()=>setActiveView(v=>v==="quests"?"units":"quests")} style={{ background:activeView==="quests"?"#1e1e12":"none", border:`1px solid ${activeView==="quests"?"#7a6a2a":"#2a2a2a"}`, color:activeView==="quests"?"#c8b060":"#666", borderRadius:"4px", padding:"5px 12px", cursor:"pointer", fontFamily:"'Cinzel',serif", fontSize:"11px", fontWeight:"600", letterSpacing:"0.04em", flexShrink:0 }}>⚔ Quests</button>
            </div>
            <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
              {STAGES.map(s => {
                const cnt = projects.reduce((sum, p) => sum + stageCountWithTokens(p, s), 0);
                if (!cnt) return null;
                const sc = STAGE_COLORS[s];
                // Tooltip: breakdown by game system
                const tooltipLines = activeEnabled.map(sid => {
                  const gs = GAME_SYSTEMS.find(g=>g.id===sid);
                  const sysArmyIds = new Set(armies.filter(a=>a.gameSystemId===sid).map(a=>a.id));
                  const sysCnt = projects.filter(p=>sysArmyIds.has(p.armyId)).reduce((sum,p)=>sum+stageCountWithTokens(p,s),0);
                  return sysCnt>0 ? { label: gs?.name||sid, value: sysCnt } : null;
                }).filter(Boolean);
                return (
                  <Tooltip key={s} lines={tooltipLines} color={sc.border}>
                    <div style={{ background:sc.dot, border:`1px solid ${sc.border}`, borderRadius:"4px", padding:"4px 10px", display:"flex", flexDirection:"column", alignItems:"center", gap:"1px", cursor:"default" }}>
                      <span style={{ color:sc.text, fontSize:"9px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.05em" }}>{STAGE_SHORT[s]}</span>
                      <span style={{ color:"#e8e0d0", fontSize:"14px", fontFamily:"'Cinzel',serif", fontWeight:"700" }}>{cnt}</span>
                    </div>
                  </Tooltip>
                );
              })}
              <div style={{ background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:"4px", padding:"4px 10px", display:"flex", flexDirection:"column", alignItems:"center", gap:"1px" }}>
                <span style={{ color:"#444", fontSize:"9px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.05em" }}>Total</span>
                <span style={{ color:"#888", fontSize:"14px", fontFamily:"'Cinzel',serif", fontWeight:"700" }}>{grandTotal}</span>
              </div>
            </div>
          </div>
          {/* System tabs */}
          <div style={{ display:"flex", overflowX:"auto", gap:"2px", alignItems:"flex-end" }}>
            {activeEnabled.map(sid => {
              const gs = GAME_SYSTEMS.find(g=>g.id===sid); if(!gs) return null;
              const isActive = gs.id===resolvedSid;
              const mc = projects.filter(p=>armies.find(a=>a.id===p.armyId&&a.gameSystemId===gs.id)).reduce((s,p)=>s+totalWithTokens(p),0);
              return (
                <button key={gs.id} onClick={()=>switchSystem(gs.id)} style={{ background:isActive?"#111":"none", border:"none", borderTop:isActive?`2px solid ${gs.color}`:"2px solid transparent", borderBottom:isActive?"1px solid #111":"1px solid transparent", color:isActive?gs.color:"#444", padding:"8px 18px", cursor:"pointer", fontFamily:"'Cinzel',serif", fontSize:"12px", fontWeight:"600", letterSpacing:"0.04em", whiteSpace:"nowrap", marginBottom:"-1px", zIndex:1, position:"relative", display:"flex", alignItems:"center", gap:"6px" }}>
                  <span>{gs.icon}</span>{gs.name}
                  {mc>0&&<span style={{ fontSize:"10px", opacity:0.5, fontFamily:"monospace", fontWeight:"400" }}>{mc}</span>}
                </button>
              );
            })}
            <div style={{ position:"relative", marginLeft:"auto", paddingBottom:"2px" }}>
              <button onClick={e=>{e.stopPropagation();setSystemPickerOpen(o=>!o);}} style={{ background:systemPickerOpen?"#1e1e2e":"none", border:`1px solid ${systemPickerOpen?"#4a4a7a":"#2a2a2a"}`, color:"#555", borderRadius:"4px", padding:"4px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"11px" }}>⚙ Systems</button>
              {systemPickerOpen&&(
                <div onClick={e=>e.stopPropagation()} style={{ position:"absolute", top:"calc(100% + 6px)", right:0, zIndex:50, background:"#161616", border:"1px solid #2a2a3a", borderRadius:"6px", padding:"8px", display:"flex", flexDirection:"column", gap:"4px", minWidth:"200px", boxShadow:"0 4px 20px rgba(0,0,0,0.6)" }}>
                  <div style={{ color:"#555", fontSize:"10px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.08em", padding:"2px 6px 6px" }}>Toggle game systems</div>
                  {GAME_SYSTEMS.map(gs=>{
                    const on=activeEnabled.includes(gs.id), cant=on&&activeEnabled.length===1;
                    return <button key={gs.id} onClick={()=>!cant&&toggleSystem(gs.id)} style={{ display:"flex", alignItems:"center", gap:"10px", background:on?"#1e1e2e":"none", border:`1px solid ${on?gs.color+"55":"#222"}`, borderRadius:"4px", padding:"7px 10px", cursor:cant?"default":"pointer", opacity:cant?0.4:1 }}>
                      <span style={{ fontSize:"14px" }}>{gs.icon}</span>
                      <span style={{ color:on?gs.color:"#555", fontFamily:"'Cinzel',serif", fontSize:"12px", fontWeight:"600", flex:1, textAlign:"left" }}>{gs.name}</span>
                      <span style={{ color:on?"#5a9a5a":"#3a3a3a", fontSize:"11px", fontFamily:"monospace" }}>{on?"ON":"OFF"}</span>
                    </button>;
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* ── Army tabs ── */}
      <div style={{ background:"#0d0d0d", borderBottom:"1px solid #1e1e1e" }}>
        <div style={{ maxWidth:"820px", margin:"0 auto", padding:"6px 20px 0", display:"flex", alignItems:"flex-start", gap:"8px" }}>
          <div style={{ display:"flex", flexWrap:"wrap", flex:1, gap:"0" }}>
            <button onClick={()=>{setActiveArmyId("all");setStageFilter("All");}} style={{ background:activeArmyId==="all"?"#161616":"none", border:"none", borderTop:activeArmyId==="all"?`2px solid ${activeSystem?.color||"#888"}88`:"2px solid transparent", borderBottom:activeArmyId==="all"?"1px solid #161616":"1px solid transparent", color:activeArmyId==="all"?"#aaa":"#444", padding:"7px 14px", cursor:"pointer", fontFamily:"'Cinzel',serif", fontSize:"11px", fontWeight:"600", letterSpacing:"0.05em", whiteSpace:"nowrap", marginBottom:"-1px", zIndex:1, position:"relative" }}>All</button>
            {systemArmies.map(army=>{
              const isActive=activeArmyId===army.id, cnt=projects.filter(p=>p.armyId===army.id).length;
              const isDragOver = armyDragOverId===army.id;
              return <button
                key={army.id}
                draggable
                onDragStart={()=>setArmyDragId(army.id)}
                onDragOver={e=>{e.preventDefault();setArmyDragOverId(army.id);}}
                onDrop={()=>reorderArmies(armyDragId, army.id)}
                onDragEnd={()=>{setArmyDragId(null);setArmyDragOverId(null);}}
                onClick={()=>{setActiveArmyId(army.id);setStageFilter("All");}}
                style={{ background:isActive?"#161616":"none", border:"none", borderTop:isActive?`2px solid ${army.color}`:isDragOver?`2px solid ${army.color}88`:"2px solid transparent", borderBottom:isActive?"1px solid #161616":"1px solid transparent", color:isActive?army.color:isDragOver?army.color+"88":"#444", padding:"7px 14px", cursor:"grab", fontFamily:"'Cinzel',serif", fontSize:"11px", fontWeight:"600", letterSpacing:"0.04em", whiteSpace:"nowrap", marginBottom:"-1px", zIndex:1, position:"relative", display:"flex", alignItems:"center", gap:"5px", transition:"color 0.15s, border-color 0.15s" }}>
                <span style={{ width:"5px", height:"5px", borderRadius:"50%", background:army.color, flexShrink:0 }}/>{army.name}
                <span style={{ fontSize:"10px", opacity:0.5, fontFamily:"monospace", fontWeight:"400" }}>{cnt}</span>
              </button>;
            })}
          </div>
          <button onClick={()=>setArmyModal("new")} style={{ background:"none", border:"1px solid #2a2a2a", color:"#555", borderRadius:"4px", padding:"4px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"11px", flexShrink:0, marginTop:"4px" }}>+ Army</button>
        </div>
      </div>

      {/* ── Body ── */}
      {activeView==="quests" ? (
        <QuestsPanel projects={projects} armies={armies}/>
      ) : (
      <div style={{ maxWidth:"820px", margin:"0 auto", padding:"16px 20px" }}>
        {/* Stage pills component — reused for army and system views */}
        {(()=>{
          const srcProjects = activeArmy ? scopeProjects : projects.filter(p=>systemArmies.some(a=>a.id===p.armyId));
          const total = srcProjects.reduce((s,p)=>s+totalWithTokens(p),0);
          if (!total && !activeArmy) return null;
          const accentColor = activeArmy ? activeArmy.color : activeSystem?.color || "#c8b870";
          const label = activeArmy ? activeArmy.name : activeSystem?.name;
          return (
            <div style={{ marginBottom:"14px", background:"#111", border:`1px solid ${accentColor}22`, borderRadius:"6px", padding:"12px 14px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  {activeArmy && <div style={{ width:"8px", height:"8px", borderRadius:"50%", background:activeArmy.color, flexShrink:0 }}/>}
                  <span style={{ fontFamily:"'Cinzel',serif", color:accentColor, fontSize:"13px", fontWeight:"600" }}>{label}</span>
                  <span style={{ color:"#3a3a3a", fontSize:"11px", fontFamily:"monospace" }}>{total} total</span>
                </div>
                {activeArmy && (
                  <div style={{ display:"flex", gap:"6px" }}>
                    <button onClick={()=>setArmyModal(activeArmy)} style={{ background:"none", border:"1px solid #2a2a2a", color:"#555", borderRadius:"4px", padding:"3px 8px", cursor:"pointer", fontSize:"11px" }}>Edit</button>
                    <button onClick={()=>deleteArmy(activeArmy.id)} style={{ background:"none", border:"1px solid #3a2020", color:"#6a4040", borderRadius:"4px", padding:"3px 8px", cursor:"pointer", fontSize:"11px" }}>Delete</button>
                  </div>
                )}
              </div>
              <div style={{ display:"flex", gap:"5px", flexWrap:"wrap" }}>
                {STAGES.map(s => {
                  const cnt = srcProjects.reduce((sum,p)=>sum+stageCountWithTokens(p,s),0);
                  if (!cnt) return null;
                  const sc = STAGE_COLORS[s];
                  // Tooltip: army view → per-unit breakdown; system view → per-army breakdown
                  const tooltipLines = activeArmy
                    ? srcProjects.filter(p=>(p.stageCounts[s]||0)+(p.hasTokens?((p.tokenStageCounts||{})[s]||0):0)>0).map(p=>({ label:p.name, value:stageCountWithTokens(p,s) }))
                    : armies.filter(a=>a.gameSystemId===resolvedSid).map(a=>{
                        const aCnt = srcProjects.filter(p=>p.armyId===a.id).reduce((sum,p)=>sum+stageCountWithTokens(p,s),0);
                        return aCnt>0 ? { label:a.name, value:aCnt } : null;
                      }).filter(Boolean);
                  return (
                    <Tooltip key={s} lines={tooltipLines} color={sc.border}>
                      <div style={{ background:sc.dot, border:`1px solid ${sc.border}`, borderRadius:"4px", padding:"4px 10px", display:"flex", flexDirection:"column", alignItems:"center", gap:"1px", cursor:"default" }}>
                        <span style={{ color:sc.text, fontSize:"9px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.05em" }}>{STAGE_SHORT[s]}</span>
                        <span style={{ color:"#e8e0d0", fontSize:"14px", fontFamily:"'Cinzel',serif", fontWeight:"700" }}>{cnt}</span>
                      </div>
                    </Tooltip>
                  );
                })}
              </div>
            </div>
          );
        })()}

        <div style={{ display:"flex", gap:"8px", alignItems:"center", marginBottom:"14px", flexWrap:"wrap" }}>
          <div style={{ display:"flex", gap:"4px", flexWrap:"wrap", flex:1 }}>
            {["All",...STAGES].map(s=>(
              <button key={s} onClick={()=>setStageFilter(s)} style={{ background:stageFilter===s?"#1e1e2e":"none", border:`1px solid ${stageFilter===s?"#4a4a7a":"#222"}`, color:stageFilter===s?"#9999cc":"#444", borderRadius:"3px", padding:"4px 10px", cursor:"pointer", fontSize:"11px", fontFamily:"monospace", letterSpacing:"0.04em", textTransform:"uppercase" }}>{s}</button>
            ))}
          </div>
          <button onClick={()=>setProjectModal("new")} disabled={systemArmies.length===0} style={{ background:systemArmies.length?"#1a1a2e":"#111", border:`1px solid ${systemArmies.length?"#5a5a9a":"#2a2a2a"}`, color:systemArmies.length?"#aaaadd":"#333", borderRadius:"4px", padding:"6px 14px", cursor:systemArmies.length?"pointer":"not-allowed", fontFamily:"'Cinzel',serif", fontSize:"12px", fontWeight:"600", letterSpacing:"0.06em", whiteSpace:"nowrap" }}>+ Add Unit</button>
        </div>



        {systemArmies.length===0 ? (
          <div style={{ color:"#333", textAlign:"center", padding:"60px 0", fontFamily:"monospace", fontSize:"13px" }}>No armies yet for {activeSystem?.name}. Hit <span style={{ color:"#555" }}>+ Army</span> to add one.</div>
        ) : visibleProjects.length===0 ? (
          <div style={{ color:"#333", textAlign:"center", padding:"60px 0", fontFamily:"monospace", fontSize:"13px" }}>{stageFilter==="All"?"No units here yet. Add one above.":`No units at the ${stageFilter} stage.`}</div>
        ) : (() => {
          const categories = activeSystem?.categories || ["Other"];
          const validCats = new Set(categories);
          const uncategorised = visibleProjects.filter(p => !p.category || !validCats.has(p.category));
          return (
            <div style={{ display:"flex", flexDirection:"column", gap:"16px" }}>
              {categories.map(cat => {
                const catProjects = visibleProjects.filter(p=>p.category===cat);
                const isDropTarget = dragOverCategory===cat && dragId!==null;
                return (
                  <div key={cat}
                    onDragOver={e=>{e.preventDefault();setDragOverCategory(cat);}}
                    onDragEnter={()=>setDragOverId(null)}
                    onDragLeave={()=>setDragOverCategory(null)}
                    onDrop={(e)=>{ if(dragId && !dragOverId) { e.stopPropagation(); assignCategory(dragId, cat); } }}
                    style={{ borderRadius:"6px", border:`1px solid ${isDropTarget?activeSystem?.color||"#5a5a9a":"#1a1a1a"}`, background:isDropTarget?"#0e0e0e":"transparent", transition:"border-color 0.15s, background 0.15s", padding:"2px" }}
                  >
                    <div style={{ display:"flex", alignItems:"center", gap:"8px", padding:"6px 8px 8px" }}>
                      <span style={{ color:"#3a3a3a", fontSize:"10px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.1em" }}>{cat}</span>
                      <span style={{ color:"#2a2a2a", fontSize:"10px", fontFamily:"monospace" }}>{catProjects.length}</span>
                      {isDropTarget && <span style={{ color:activeSystem?.color||"#5a5a9a", fontSize:"10px", fontFamily:"monospace" }}>← drop here</span>}
                    </div>
                    {catProjects.length===0 ? (
                      <div style={{ border:"1px dashed #1e1e1e", borderRadius:"4px", padding:"16px", textAlign:"center", color:"#2a2a2a", fontSize:"11px", fontFamily:"monospace" }}>
                        drag units here
                      </div>
                    ) : (
                      <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                        {catProjects.map(p=>(
                          <ProjectCard
                            key={p.id}
                            project={p}
                            onEdit={setProjectModal}
                            onDelete={deleteProject}
                            onUpdateCounts={updateCounts}
                            isDragOver={dragOverId===p.id}
                            onDragStart={()=>setDragId(p.id)}
                            onDragOver={()=>setDragOverId(p.id)}
                            onDrop={(e)=>{ e.stopPropagation(); reorderProjects(dragId, p.id); }}
                          />
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
              {uncategorised.length > 0 && (
                <div
                  onDragOver={e=>{e.preventDefault();setDragOverCategory("__uncategorised__");}}
                  onDragLeave={()=>setDragOverCategory(null)}
                  onDrop={()=>{ if(dragId) { setDragId(null); setDragOverCategory(null); } }}
                  style={{ borderRadius:"6px", border:"1px solid #3a2a1a", background:"#0e0a06", padding:"2px" }}
                >
                  <div style={{ display:"flex", alignItems:"center", gap:"8px", padding:"6px 8px 8px" }}>
                    <span style={{ color:"#6a4a2a", fontSize:"10px", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:"0.1em" }}>⚠ Uncategorised</span>
                    <span style={{ color:"#4a3a2a", fontSize:"10px", fontFamily:"monospace" }}>{uncategorised.length} — drag these into a category above</span>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                    {uncategorised.map(p=>(
                      <ProjectCard
                        key={p.id}
                        project={p}
                        onEdit={setProjectModal}
                        onDelete={deleteProject}
                        onUpdateCounts={updateCounts}
                        isDragOver={dragOverId===p.id}
                        onDragStart={()=>setDragId(p.id)}
                        onDragOver={()=>setDragOverId(p.id)}
                        onDrop={()=>reorderProjects(dragId, p.id)}
                      />
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })()}
      </div>

      )}
      {projectModal&&<ProjectModal project={projectModal==="new"?null:projectModal} armies={systemArmies} defaultArmyId={activeArmyId!=="all"?activeArmyId:systemArmies[0]?.id} onSave={saveProject} onClose={()=>setProjectModal(null)}/>}
      {armyModal&&<ArmyModal army={armyModal==="new"?null:armyModal} gameSystemId={resolvedSid} factions={GAME_SYSTEMS.find(g=>g.id===resolvedSid)?.factions||[]} onSave={saveArmy} onClose={()=>setArmyModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
